name: Publish

concurrency:
  group: publish
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
  - cron: '0 1 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Fail if we are attempting to run on the master branch
      if: ${{GITHUB.REF_NAME == 'master' && github.repository == 'space-wizards/space-station-14'}}
      run: exit 1

#    - name: Install dependencies
#      run: sudo apt-get install -y python3-paramiko python3-lxml

    - uses: actions/checkout@v4.2.2
      with:
        submodules: 'recursive'

    # Corvax-Secrets-Start
    - name: Setup secrets
      env:
        SSH_KEY: ${{ secrets.SECRETS_PRIVATE_KEY }}
      if: ${{ env.SSH_KEY != '' }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SECRETS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "HOST *" > ~/.ssh/config
        echo "  Hostname github.com" >> ~/.ssh/config
        echo "  Port 22" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        git clone git@github.com:corvax-nexus/secrets.git Secrets
        cp -R Secrets/Resources/Prototypes Resources/Prototypes/CorvaxSecrets
        cp -R Secrets/Resources/ServerPrototypes Resources/Prototypes/CorvaxSecretsServer
        cp -R Secrets/Resources/Locale Resources/Locale/ru-RU/corvax-secrets
        cp -R Secrets/Resources/Textures Resources/Textures/CorvaxSecrets
        cp -R Secrets/Resources/Audio Resources/Audio/CorvaxSecrets
    # Corvax-Secrets-End

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 10.0.x

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform win-arm64 --platform linux-x64 --platform linux-arm64 --platform osx-x64 --platform osx-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Package server
      run: |
        dotnet run --project Content.Packaging server -c Release \
        --platform linux-x64 \
        /p:PublishTrimmed=false /p:EnableTrimAnalyzer=false

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Upload Server Build to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "release/SS14.Server_linux-x64.zip"
        target: "/tmp/ss14_build"
        rm: true

    - name: Unpack Build and Trigger Watchdog
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          SERVER_BIN_DIR="/home/ss14/watchdog/instances/rmc-server/bin"
          mkdir -p "$SERVER_BIN_DIR"

          unzip -q -o /tmp/ss14_build/release/SS14.Server_linux-x64.zip -d "$SERVER_BIN_DIR/"
          
          rm -rf /tmp/ss14_build

          curl -i -X POST "http://127.0.0.1:5000/api/instance/rmc-server/update" \
               -H "Authorization: Bearer ${{ secrets.PUBLISH_TOKEN }}"

