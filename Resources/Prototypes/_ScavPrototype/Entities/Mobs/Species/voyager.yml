- type: entity
  save: false
  parent: BaseMobSpeciesOrganic
  id: MobVoyager
  name: Урист МакРасист
  components:
  - type: PseudoItem
    storedOffset: 0,17
    shape:
      - 0,0,1,4
      - 0,2,3,4
      - 4,0,5,4
  - type: Carriable
  - type: CantCarryOthers
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Voyager/parts.rsi
    state: full
  - type: HumanoidAppearance
    species: Voyager
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Body
    prototype: Voyager
  - type: Vocal
    sounds:
      Male: MaleSpeciman
      Unsexed: MaleSpeciman
      Female: FemaleSpeciman
  - type: Speech
    speechSounds: MaleSpeciman
    allowedEmotes: [ 'Bark', 'Growl' ]
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodYellowMeat
      amount: 4
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#FFCC00"
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 4
        Structural: 5
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      170: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      50: 0.7
      70: 0.5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: YellowBlood
        Quantity: 265
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Speciman
  - type: Temperature
    heatDamageThreshold: 335
    coldDamageThreshold: 240
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      283: 0.85
      270: 0.75
      250: 0.65
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 80
    damage:
      types:
        Heat: -0.04
        Cold: -0.05
        Shock: -0.02
      groups:
        Brute: -0.07
        Toxin: -0.04
  - type: Stamina
    baseCritThreshold: 80
    decay: 2.5
  - type: Hunger
    baseDecayRate: 0.033
    starvationDamage:
      types:
        Bloodloss: 0.7
        Cold: 0.05
  - type: Thirst
    baseDecayRate: 0.17
  - type: ScaleVisuals
    scale: 0.8, 0.8
  - type: ActionGrant
    actions:
    - ActionVoyagerToggleInvisibility
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - SpecimanCraft
    - AnomalyHost
  - type: PointLight
    radius: 1.3
    energy: 0.35
    color: "#c8cc5b"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.28
        density: 105
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Sharp
  - type: Inventory
    speciesId: Voyager
    templateId: speciman
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: outerwear
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hand
      belt:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: belt

- type: entity
  parent: BaseSpeciesDummy
  id: MobVoyagerDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: Voyager

- type: entity
  parent: BaseAction
  id: ActionVoyagerToggleInvisibility
  name: "Переключить невидимость"
  description: Вы можете контролировать вашу способность невидимости.
  components:
  - type: Action
    useDelay: 5
    icon:
      sprite: _ScavPrototype/Mobs/Species/Voyager/invisibility_action.rsi
      state: icon
  - type: InstantAction
    event: !type:RelayedActionComponentChangeEvent
      components:
      - type: Stealth
      - type: StealthOnMove
        movementVisibilityRate: 0.15
        passiveVisibilityRate: -0.1
