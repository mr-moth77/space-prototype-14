- type: entity
  parent: PlushieExperiment
  id: PlushieMilky
  name: милки плюшка
  description: Пушистый, похож на белого экспи. Не перепутайте с молоком!
  components:
  - type: Sprite
    sprite: _ScavPrototype/Objects/Fun/milky_plushie.rsi
  - type: Item
    sprite: _ScavPrototype/Objects/Fun/milky_plushie.rsi
  - type: EmitSoundOnUse
    sound: &PlushieExperimentSound
      path: /Audio/Items/Toys/arf.ogg
      params:
        volume: -5
        pitch: 1.3
  - type: EmitSoundOnLand
    sound: *PlushieExperimentSound
  - type: EmitSoundOnActivate
    sound: *PlushieExperimentSound
  - type: EmitSoundOnTrigger
    sound: *PlushieExperimentSound
  - type: EmitSoundOnCollide
    sound: *PlushieExperimentSound
  - type: Edible
    useSound: *PlushieExperimentSound
  - type: MeleeWeapon
    soundHit: *PlushieExperimentSound
  - type: Clothing
    sprite: _ScavPrototype/Objects/Fun/milky_plushie.rsi
    slots:
    - HEAD

