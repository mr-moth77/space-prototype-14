- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsGlovesKnight
  name: комбинированные перчатки "Кара"
  description: Модификация боевых перчаток под авторством самых злобных офицеров Кованных, в первую очередь предназначенные для их использования руководящим составом что занимается процессом рекрутинга пушечного мяса, в рамках демонстрации того, что следует за непослушанием. Главным отличием от боевых перчаток является то... Что ударная часть перчатки "Кара" была значительно усилена металлом неизвестного происхождения, в следствии чего она одновременно позволяет офицеру повыбивать зубы у нахального рекрута с пары ударов, и обеспечивать комфорт в любое время года.
  components:
  - type: Sprite
    sprite: _ScavPrototype/Clothing/Hands/combatgloves.rsi
  - type: Clothing
    sprite: _ScavPrototype/Clothing/Hands/combatgloves.rsi
  - type: Armor
    coverage:
    - Hand
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.90
        Piercing: 0.95
        Heat: 0.90
  - type: MeleeWeapon
    mustBeEquippedToUse: true
    attackRate: 1.25
    damage:
      types:
        Blunt: 20
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    canWideSwing: true
