- type: entity
  parent: ClothingOuterHardsuitBase
  id: ScavClothingOuterHardsuitLord
  name: боевая броня "Молот"
  description: Стандартный офицерский бронекостюм третьего поколения, встречаемый у офицеров Кованых от низшего, до высшего рангов. В отличии от штатной боевой экипировки пехоты, в бронекостюме используются технологичные и высококачественные материалы, обеспечивающие высокие показали защиты, а за счёт встроенных сервоприводов в ноги, даже дополнительную манёвренность! Явно чтобы наверняка, не враг и не подчинённый, не смог скрыться от заслуженной расправы...
  components:
  - type: Sprite
    sprite: _ScavPrototype/Clothing/OuterClothing/Hardsuits/wboslordarmor.rsi
  - type: Clothing
    sprite: _ScavPrototype/Clothing/OuterClothing/Hardsuits/wboslordarmor.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Foot
    - Tail
    modifiers:
      coefficients:
        Blunt: 0.30
        Slash: 0.35
        Piercing: 0.30
        Heat: 0.40
        Caustic: 0.50
  - type: StaminaResistance
    damageCoefficient: 0.35
  - type: ExplosionResistance
    damageCoefficient: 0.50
  - type: ModifyDelayedKnockdown
    delayDelta: 3.0
    knockdownTimeDelta: -3.0
  - type: ClothingSpeedModifier
    walkModifier: 1.10
    sprintModifier: 1.10
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: ToggleableClothing
    clothingPrototypes:
      head: ScavClothingHeadHardsuitLord


