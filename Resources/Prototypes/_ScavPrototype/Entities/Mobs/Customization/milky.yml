#---------База
- type: marking
  id: MilkyEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Milky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Milky/milky_parts.rsi
    state: ears_milkybase

- type: marking
  id: MilkyTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Milky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Milky/milky_parts.rsi
    state: tail_milkybase

- type: marking
  id: MilkyEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [Milky]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Milky/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/Milky/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/Milky/parts.rsi
    state: eyes_eyelids

- type: marking
  id: MilkyFinBase
  bodyPart: Chest
  markingCategory: Chest
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Milky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Milky/milky_parts.rsi
    state: fin_milkybase

