#---------База
- type: marking
  id: OrangeEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Orange]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Orange/orange_parts.rsi
    state: ears_orangebase

- type: marking
  id: OrangeTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Orange]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Orange/orange_parts.rsi
    state: tail_orangebase

- type: marking
  id: OrangeEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [Orange]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: eyes_eyelids

- type: marking
  id: OrangeLowArmsBase
  bodyPart: Chest
  markingCategory: Chest
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Orange]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_l_arm
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_r_arm
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_l_hand
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_r_hand


#-----------Бинты
- type: marking
  id: OrangeLowArmsBandageLeft
  bodyPart: Chest
  markingCategory: Chest
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Orange]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Orange/scars.rsi
    state: bandaged_low_l_arm
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_r_arm
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_l_hand
  - sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: low_r_hand


