#---------База
- type: marking
  id: ExpilkyEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Expilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Expilky/expilky_parts.rsi
    state: ears_expilkybase

- type: marking
  id: ExpilkyTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Expilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Expilky/expilky_parts.rsi
    state: tail_expilkybase

- type: marking
  id: ExpilkyEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [Expilky]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Expilky/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/Expilky/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/Expilky/parts.rsi
    state: eyes_eyelids

- type: marking
  id: ExpilkyFinBase
  bodyPart: Chest
  markingCategory: Chest
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Expilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Expilky/expilky_parts.rsi
    state: fin_expilkybase
