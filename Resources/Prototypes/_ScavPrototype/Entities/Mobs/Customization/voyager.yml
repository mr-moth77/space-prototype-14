#---------База
- type: marking
  id: VoyagerEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Voyager]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Voyager/voyager_parts.rsi
    state: ears_voyagerbase

- type: marking
  id: VoyagerTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Voyager]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Voyager/voyager_parts.rsi
    state: tail_voyagerbase

- type: marking
  id: VoyagerEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [Voyager]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Voyager/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/Voyager/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/Voyager/parts.rsi
    state: eyes_eyelids
