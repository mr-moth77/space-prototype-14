#---------База
- type: marking
  id: RozaTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Roza]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Roza/roza_parts.rsi
    state: tail_rozabase

- type: marking
  id: RozaEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [Roza]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Roza/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/Roza/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/Roza/parts.rsi
    state: eyes_eyelids

- type: marking
  id: RozaEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [Roza]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/Roza/roza_parts.rsi
    state: ears_rozabase
