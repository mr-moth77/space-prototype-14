- type: entity
  id: PartVelvet
  parent: [BaseItem, BasePart]
  name: "Velvet body part"
  abstract: true
  components:
  - type: WoundableVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Shitmed/Mobs/Effects/brute_damage.rsi
        color: "#FFCC00"
      Burn:
        sprite: _Shitmed/Mobs/Effects/burn_damage.rsi
  - type: Damageable
    damageContainer: Biological

- type: entity
  id: ChestVelvet
  name: "Velvet Chest"
  parent: [PartVelvet, BaseChest]
  components:
  - type: Sprite
    netsync: false
    sprite: _ScavPrototype/Mobs/Species/Velvet/parts.rsi
    state: "chest_m"
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Velvet/parts.rsi
    state: "chest_m"

