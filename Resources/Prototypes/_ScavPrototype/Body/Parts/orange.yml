- type: entity
  id: PartOrange
  parent: [BaseItem, BasePart]
  name: "Orange body part"
  abstract: true
  components:
  - type: WoundableVisuals
    damageOverlayGroups:
      Brute:
        sprite: _Shitmed/Mobs/Effects/brute_damage.rsi
        color: "#FFCC00"
      Burn:
        sprite: _Shitmed/Mobs/Effects/burn_damage.rsi
  - type: Damageable
    damageContainer: Biological

- type: entity
  id: ChestOrange
  name: "Orange Chest"
  parent: [PartOrange, BaseChest]
  components:
  - type: Sprite
    netsync: false
    sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: "chest_m"
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Orange/parts.rsi
    state: "chest_m"
  - type: BodyPart
    children:
      groin:
        id: groin
        type: Groin
      right arm:
        id: right arm
        type: Arm
      left arm:
        id: left arm
        type: Arm
      head:
        id: head
        type: Head
      low right arm:
        id: low right arm
        type: Arm
      low left arm:
        id: low left arm
        type: Arm

