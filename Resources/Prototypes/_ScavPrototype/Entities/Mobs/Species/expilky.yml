- type: entity
  save: false
  parent: BaseMobSpeciesOrganic
  id: MobExpilky
  name: Урист МакОрио
  components:
  - type: PseudoItem
    storedOffset: 0,17
    shape:
      - 0,0,1,4
      - 0,2,3,4
      - 4,0,5,4
  - type: Carriable
  - type: CantCarryOthers
  - type: Icon
    sprite: _ScavPrototype/Mobs/Species/Expilky/parts.rsi
    state: full
  - type: HumanoidAppearance
    species: Expilky
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Body
    prototype: Expilky
  - type: Vocal
    sounds:
      Male: MaleSpeciman
      Unsexed: MaleSpeciman
      Female: FemaleSpeciman
  - type: Speech
    speechSounds: MaleSpeciman
    allowedEmotes: [ 'Bark', 'Growl' ]
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodYellowMeat
      amount: 3
#  - type: DamageVisuals
#    damageOverlayGroups:
#      Brute:
#        sprite: Mobs/Effects/brute_damage.rsi
#        color: "#FFCC00"
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 4
        Structural: 7
  - type: MovementSpeedModifier #Canned-Scav / Connection Edit
    baseWalkSpeed: 2.6
    baseSprintSpeed: 4.75
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical #Canned-Scav / Connection Edit (Original - 50)
      180: Dead #Canned-Scav / Connection Edit (Original - 100)
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.7 #Canned-Scav / Connection Edit (Original - 30)
      75: 0.5 #Canned-Scav / Connection Edit (Original - 40)
  - type: Bloodstream
    bloodReagent: YellowBlood
    bloodReferenceSolution:
      reagents:
      - ReagentId: YellowBlood
        Quantity: 275
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Speciman
  - type: Temperature
    heatDamageThreshold: 335
    coldDamageThreshold: 240
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      273: 0.85
      260: 0.75
      240: 0.65
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 90
    damage:
      types:
        Heat: -0.03
        Cold: -0.04
        Shock: -0.01
      groups:
        Brute: -0.05
        Toxin: -0.03
  - type: Stamina
    critThreshold: 80 #Canned-Scav / Connection Edit (Original - 60)
    decay: 2.5  #Canned-Scav / Connection Edit (Original - 2.5)
    cooldown: 4
  - type: Hunger
    baseDecayRate: 0.025
    starvationDamage:
      types:
        Bloodloss: 0.6
        Cold: 0.05
  - type: Thirst
    baseDecayRate: 0.12
#  - type: ScaleVisuals no use
#    scale: 0.65, 0.65
  - type: ActionGrant
    actions:
    - MilkyVomitAction
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - SpecimanCraft
    - AnomalyHost
  - type: PointLight
    radius: 1.2
    energy: 0.35
    color: "#a1d5e6"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.23
        density: 85
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Sharp
  - type: Inventory
    speciesId: Expilky
    templateId: speciman
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: outerwear
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hand
      belt:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: belt

- type: entity
  parent: BaseSpeciesDummy
  id: MobExpilkyDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: Expilky
