#---------База
- type: marking
  id: BoldMilkyEarsBase
  bodyPart: HeadSide
  markingCategory: HeadSide
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [BoldMilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/milky_parts.rsi
    state: ears_milkybase

- type: marking
  id: BoldMilkyTailBase
  bodyPart: Tail
  markingCategory: Tail
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [BoldMilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/milky_parts.rsi
    state: tail_milkybase

- type: marking
  id: BoldMilkyEyesBase
  bodyPart: Eyes
  markingCategory: Head
  followSkinColor: false
  speciesRestriction: [BoldMilky]
  coloring:
    default:
      type:
        !type:EyeColoring
    layers:
      eyes_base:
        type:
          !type:SimpleColoring
            color: "#FFFFFF"
      eyes_eyelids:
        type:
          !type:SkinColoring
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/parts.rsi
    state: eyes_base
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/parts.rsi
    state: eyes_pupil
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/parts.rsi
    state: eyes_eyelids

- type: marking
  id: BoldMilkyFinBase
  bodyPart: Chest
  markingCategory: Chest
  forcedColoring: true
  followSkinColor: true
  speciesRestriction: [BoldMilky]
  sprites:
  - sprite: _ScavPrototype/Mobs/Species/BoldMilky/milky_parts.rsi
    state: fin_milkybase

